# ==============================================================================
# This file is the root manifest for the model-agnostic agent system.
# It defines project metadata, security rules, and the registry of agents.
# Any AI tool can parse this YAML to understand the project context.
# ==============================================================================

project:
  name: my_app
  type: elixir_umbrella
  apps:
    - name: my_app_one
      path: apps/my_app_one
      description: "A single one app"
    - name: my_app_two
      path: apps/my_app_two
      description: "A single two app"

# ==============================================================================
# Security & Permissions
# ==============================================================================
# Agents MUST respect these rules. Each tool adapter should map these
# to its native permission format (e.g., .claude/settings.json, .cursorrules).
#
# Mapping examples:
#   Claude Code:  security.deny.files -> permissions.deny["Read(path)"]
#   Gemini:       security.deny.files -> system instruction restrictions
#   Cursor:       security.deny       -> .cursorrules deny patterns
# ==============================================================================
security:
  deny:
    files:
      - path: "etc/**"
        reason: "Contains application secrets and sensitive configuration"
      - path: "config/prod.exs"
        reason: "Production configuration should not be modified by agents"
      - path: "config/dev.exs"
        reason: "Development configuration should not be modified by agents"
      - path: ".git/**"
        reason: "Git internals must not be accessed"
    commands:
      - pattern: "npm *"
        reason: "No npm commands allowed"
      - pattern: "yarn *"
        reason: "No yarn commands allowed"
      - pattern: "mix deps.*"
        reason: "Do not install or modify dependencies"
      - pattern: "mix ecto.*"
        reason: "Do not run migrations or database commands"
      - pattern: "rm *"
        reason: "Do not delete files"
  allow:
    commands:
      - pattern: "mix format"
        description: "Format Elixir code"
      - pattern: "mix compile"
        description: "Compile the project to verify changes"

# ==============================================================================
# Global Conventions
# ==============================================================================
conventions:
  language: "en"
  language_rule: >
    ALL agent output MUST be written in English.
  formatting:
    - command: "mix format"
      description: "ALL agents MUST run mix format after modifying Elixir files"
      required: true

# ==============================================================================
# Internationalization
# ==============================================================================
i18n:
  supported_locales: ["en", "es"]
  default_locale: "en"
  gettext_module: "MyAppOne.Gettext"
  paths:
    pot: "apps/my_app_one/priv/gettext/"
    po_en: "apps/my_app_one/priv/gettext/en/LC_MESSAGES/"
    po_es: "apps/my_app_one/priv/gettext/es/LC_MESSAGES/"

# ==============================================================================
# Registered Agents
# ==============================================================================
agents:
  - id: my_command_agent
    command: "/my_command_agent"
    trigger: "command"
    path: agents/my_command_agent/agent.yaml
    workflow: workflows/my_command_agent.md
    description: "A sample agent invoked manually via slash command"

  - id: my_other_command_agent
    command: "/my_other_command_agent"
    trigger: "command"
    path: agents/my_other_command_agent/agent.yaml
    workflow: workflows/my_other_command_agent.md
    description: "Another sample agent invoked manually via slash command"

  - id: my_hook_agent
    trigger: "hook"
    hook: "post-commit"
    path: agents/my_hook_agent/agent.yaml
    workflow: workflows/my_hook_agent.md
    description: "A sample agent triggered automatically after each commit"

# ==============================================================================
# Registered Workflows
# ==============================================================================
workflows:
  - id: my_command_agent
    path: workflows/my_command_agent.md
    description: "Workflow for the sample command agent"

  - id: my_other_command_agent
    path: workflows/my_other_command_agent.md
    description: "Workflow for the other sample command agent"

  - id: my_hook_agent
    path: workflows/my_hook_agent.md
    description: "Workflow triggered automatically by post-commit hook"
